unbind r
bind r source-file ~/.tmux.conf # source tmux.conf file 

set-option -g allow-rename off
set-option -g automatic-rename off
set -g prefix C-s # rebind leader to Ctrl s
set -g base-index 1 # start at index 1, makes it a lot easier to switch windows via number keys
set -g mouse on # Allows you to resize panes with mouse

# Below toggles status bar, I like it disabled when in nvim
bind-key b if-shell "[[ $(tmux show-option -gv status) == 'on' ]]" 'set -g status off' 'set -g status on'

# List of plugins
set -g @plugin 'tmux-plugins/tpm' # plugin manager
set -g @plugin 'dracula/tmux'

# dracula configuration
set -g @dracula-plugins "none" # configure specific plugins you want to show up on the right side
set -g @dracula-show-left-icon "#S"

# set -g @plugin 'catppuccin/tmux#v2.3.0'
# Below settings allowed for window renaming with catppuccin
# set -g @catppuccin_window_default_text "#W"
# set -g @catppuccin_window_text "#W"
# set -g @catppuccin_window_current_text "#W"

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
